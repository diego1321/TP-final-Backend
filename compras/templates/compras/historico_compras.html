<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Compras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">🛒 Histórico de Compras</h2>
            <a href="{% url 'inventario:dashboard' %}" class="btn btn-outline-secondary">Volver al Panel</a>
        </div>
        
        <div class="card shadow-sm border-0 p-4">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Proveedor</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for compra in compras %}
                    <tr>
                        <td>#{{ compra.id }}</td>
                        <td>{{ compra.proveedor.nombre }}</td>
                        <td>{{ compra.fecha|date:"d/m/Y H:i" }}</td>
                        <td>
                            <a href="{% url 'ventas:generar_pdf' 'compra' compra.id %}" class="btn btn-sm btn-danger">📥 Descargar PDF</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4" class="text-center">No hay compras registradas.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
