<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resumen de Operación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 600px;">
        <div class="card p-4 shadow border-0 rounded-4 bg-white text-center">
            <div class="mb-3">
                <span class="fs-1">✅</span>
            </div>
            <h3 class="fw-bold text-dark mb-1">¡operación exitosa!</h3>
            <p class="text-muted small">Documento Registrado Formalmente #{{ doc_id }}</p>
            
            <div class="text-start my-4 p-3 bg-light rounded-3">
                <h6 class="fw-bold text-uppercase border-bottom pb-2 text-secondary">{{ tipo }}</h6>
                <ul class="list-group list-group-flush bg-transparent">
                    <script>let totalOperacion = 0;</script>

                    {% for item in items %}
                    <li class="list-group-item bg-transparent d-flex justify-content-between align-items-center px-0">
                        <span>{{ item.producto }} <strong class="text-primary">x{{ item.cantidad }}</strong></span>
                        <span class="fw-semibold text-secondary">${{ item.precio }} c/u</span>
                    </li>
                    <script>
                        totalOperacion += parseFloat("{{ item.precio }}") * parseInt("{{ item.cantidad }}");
                    </script>
                    {% endfor %}
                </ul>
                
                <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-2 fw-bold text-dark fs-5">
                    <span>Total General:</span>
                    <span id="total-final-display">$0.00</span>
                </div>
            </div>

            <a href="{% url 'dashboard' %}" class="btn btn-primary w-100 py-2 fw-medium">Volver al Dashboard</a>
        </div>
    </div>

    <script>
        document.getElementById('total-final-display').innerText = '$' + totalOperacion.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    </script>
</body>
</html>
