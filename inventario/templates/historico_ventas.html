<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"> Histórico de Ventas</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Volver al Panel</a>
        </div>
        
        <div class="card shadow-sm border-0 p-4">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in ventas %}
                    <tr>
                        <td>#{{ v.id }}</td>
                        <td>{{ v.cliente.nombre }}</td>
                        <td>{{ v.fecha|date:"d/m/Y H:i" }}</td>
                        <td>
                            <a href="{% url 'generar_pdf' 'venta' v.id %}" class="btn btn-sm btn-primary">📥 Descargar PDF</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4" class="text-center">No hay ventas registradas.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
