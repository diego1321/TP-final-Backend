<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 800px;">
        <div class="card p-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-primary m-0">Top Productos Más Vendidos</h4>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">Volver</a>
            </div>

            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Producto</th>
                        <th class="text-center">Total Vendido</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in productos_top %}
                    <tr>
                        <td class="fw-bold">{{ p.nombre }}</td>
                        <td class="text-center">
                            <span class="badge bg-primary rounded-pill">{{ p.total_vendido }} unidades</span>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted">Aún no hay ventas registradas.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
